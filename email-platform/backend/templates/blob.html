<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .hero-text { font-size: 36px !important; }
    .pad { padding: 24px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#f0f1f5;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#f0f1f5">
<tbody><tr><td align="center" style="padding:32px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#f57e9a;overflow:hidden;">
  <tbody>

    <!-- Top nav -->
    <tr>
      <td style="background-color:#000000;padding:10px 24px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="color:#ffffff;font-size:13px;letter-spacing:-0.02em;">{{business_name}}</td>
            <td style="color:#a8879d;font-size:13px;text-align:right;letter-spacing:-0.02em;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Big header -->
    <tr>
      <td style="padding:32px 24px 8px 24px;">
        <div class="hero-text" style="font-size:58px;font-weight:900;color:#1a0010;line-height:1.05;letter-spacing:-1.5px;font-family:Arial,Helvetica,sans-serif;">{{header}}</div>
      </td>
    </tr>

    <!-- Subject line -->
    <tr>
      <td style="padding:8px 24px 20px 24px;">
        <div style="font-size:17px;color:#3d0020;letter-spacing:-0.01em;">{{subject}}</div>
      </td>
    </tr>

    <!-- Hero image -->
    <tr>
      <td style="padding:0;">
        <img src="https://i.ibb.co/WNJBB4mq/bc65c8eecac75708a01b50a34fea1695.png"
          width="600" style="display:block;width:100%;height:auto;" alt="">
      </td>
    </tr>

    <!-- Body content -->
    <tr>
      <td class="pad" style="padding:28px 24px;background-color:#ffffff;">
        <p style="margin:0 0 14px;font-size:17px;font-weight:700;color:#1a0010;">Hi {{name}},</p>
        <p style="margin:0;font-size:15px;color:#3d1a2a;line-height:1.75;white-space:pre-wrap;">{{body}}</p>
      </td>
    </tr>

    <!-- Secondary image -->
    <tr>
      <td style="padding:0 24px 24px;background-color:#ffffff;text-align:right;">
        <img src="https://i.ibb.co/m5zDcnnc/ff3c242e8ef9de316894a949fe7aaf33.png"
          width="360" style="display:block;width:60%;height:auto;margin-left:auto;" alt="">
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="padding:16px 24px;background-color:#000000;text-align:center;">
        <p style="margin:0;font-size:12px;color:#888;letter-spacing:0.08em;">
          CONTACT US &nbsp;|&nbsp; MANAGE PREFERENCES &nbsp;|&nbsp; UNSUBSCRIBE
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
