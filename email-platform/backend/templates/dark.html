<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
@media (max-width: 450px) {
  .pad { padding: 24px 20px !important; }
}
</style>
</head>
<body style="margin:0;padding:0;background-color:#0d0d0d;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#0d0d0d">
<tbody><tr><td align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#141414;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;">
  <tbody>

    <!-- Top nav bar -->
    <tr>
      <td style="padding:16px 32px;border-bottom:1px solid #2a2a2a;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#ffffff;">{{business_name}}</td>
            <td style="font-size:11px;color:#555;text-align:right;vertical-align:middle;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Subject pill -->
    <tr>
      <td style="padding:36px 32px 0 32px;">
        <div style="display:inline-block;padding:4px 14px;background-color:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.4);border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#c084fc;">{{subject}}</div>
      </td>
    </tr>

    <!-- Big heading -->
    <tr>
      <td style="padding:16px 32px 8px 32px;">
        <div style="font-size:44px;font-weight:900;color:#f8fafc;line-height:1.1;letter-spacing:-1px;">{{header}}</div>
      </td>
    </tr>

    <!-- Divider -->
    <tr>
      <td style="padding:16px 32px;">
        <div style="height:1px;background:linear-gradient(to right,#a855f7,transparent);"></div>
      </td>
    </tr>

    <!-- Body text -->
    <tr>
      <td class="pad" style="padding:0 32px 32px 32px;">
        <p style="margin:0 0 16px;font-size:16px;font-weight:700;color:#f8fafc;">Hi {{name}},</p>
        <p style="margin:0;font-size:15px;color:#94a3b8;line-height:1.8;white-space:pre-wrap;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="padding:20px 32px;border-top:1px solid #2a2a2a;text-align:center;">
        <p style="margin:0;font-size:11px;color:#3f3f3f;line-height:1.8;">
          © 2025 {{business_name}} · {{website}}<br>
          <span style="text-decoration:underline;cursor:pointer;">Unsubscribe</span> · <span style="text-decoration:underline;cursor:pointer;">Manage Preferences</span>
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
