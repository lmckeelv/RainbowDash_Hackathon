<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .pad { padding: 32px 24px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#f4f4f4">
<tbody><tr><td align="center" style="padding:48px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:560px;background-color:#ffffff;">
  <tbody>

    <!-- Thin top stripe -->
    <tr><td style="height:3px;background-color:#111111;font-size:0;">&nbsp;</td></tr>

    <!-- Logo row -->
    <tr>
      <td style="padding:28px 40px 20px 40px;border-bottom:1px solid #eeeeee;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#111111;">{{business_name}}</td>
            <td style="font-size:12px;color:#999999;text-align:right;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Subject + headline -->
    <tr>
      <td class="pad" style="padding:40px 40px 28px 40px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#999999;margin-bottom:16px;">{{subject}}</div>
        <div style="font-size:34px;font-weight:300;color:#111111;line-height:1.2;letter-spacing:-0.5px;">{{header}}</div>
        <div style="height:1px;background-color:#eeeeee;margin:24px 0;"></div>
        <p style="margin:0 0 14px;font-size:15px;color:#333333;">Hi {{name}},</p>
        <p style="margin:0;font-size:15px;color:#555555;line-height:1.85;white-space:pre-wrap;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="padding:20px 40px;border-top:1px solid #eeeeee;background-color:#fafafa;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:11px;color:#bbbbbb;">© 2025 {{business_name}}</td>
            <td style="text-align:right;font-size:11px;color:#bbbbbb;"><span style="text-decoration:underline;cursor:pointer;">Unsubscribe</span></td>
          </tr>
        </table>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
