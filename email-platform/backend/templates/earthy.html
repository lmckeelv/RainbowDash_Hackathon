<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .hero { font-size: 36px !important; }
    .pad { padding: 28px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#f5ede0;font-family:Georgia,'Times New Roman',serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#f5ede0">
<tbody><tr><td align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:580px;background-color:#faf6f0;border:1px solid #e8d5bf;overflow:hidden;">
  <tbody>

    <!-- Header -->
    <tr>
      <td style="background-color:#c4622d;padding:22px 32px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:14px;font-weight:700;color:#faf6f0;font-family:'Helvetica Neue',Arial,sans-serif;letter-spacing:0.06em;">{{business_name}}</td>
            <td style="font-size:12px;color:rgba(250,246,240,0.65);text-align:right;font-family:'Helvetica Neue',Arial,sans-serif;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Ornamental divider -->
    <tr>
      <td style="background-color:#e8825a;padding:6px 32px;text-align:center;">
        <div style="font-size:14px;color:#faf6f0;letter-spacing:0.3em;">✦ ✦ ✦</div>
      </td>
    </tr>

    <!-- Headline block -->
    <tr>
      <td style="padding:36px 32px 20px 32px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#c4622d;font-family:'Helvetica Neue',Arial,sans-serif;margin-bottom:14px;">{{subject}}</div>
        <div class="hero" style="font-size:42px;font-weight:normal;color:#2c1810;line-height:1.15;letter-spacing:-0.3px;">{{header}}</div>
      </td>
    </tr>

    <!-- Horizontal rule -->
    <tr>
      <td style="padding:0 32px 24px 32px;">
        <div style="height:1px;background-color:#e8d5bf;"></div>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="pad" style="padding:0 32px 36px 32px;">
        <p style="margin:0 0 14px;font-size:17px;color:#2c1810;font-style:italic;">Dear {{name}},</p>
        <p style="margin:0;font-size:15px;color:#4a3020;line-height:1.9;white-space:pre-wrap;font-family:'Helvetica Neue',Arial,sans-serif;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="background-color:#2c1810;padding:18px 32px;text-align:center;">
        <p style="margin:0;font-size:11px;color:#8a6a5a;line-height:1.8;font-family:'Helvetica Neue',Arial,sans-serif;letter-spacing:0.06em;">
          {{business_name}} · {{website}}<br>
          <span style="text-decoration:underline;">UNSUBSCRIBE</span> &nbsp;·&nbsp; <span style="text-decoration:underline;">MANAGE PREFERENCES</span>
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
