<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
@media (max-width: 450px) {
  .outer { padding: 16px 8px !important; }
  .inner { padding: 24px 20px !important; }
}
</style>
</head>
<body style="margin:0;padding:0;background-color:#e8f4f8;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#e8f4f8">
<tbody><tr><td class="outer" align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#ffffff;border-radius:4px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
  <tbody>

    <!-- Branded top bar -->
    <tr>
      <td style="background-color:#79b7cf;padding:20px 32px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:16px;font-weight:700;color:#ffffff;letter-spacing:0.02em;">{{business_name}}</td>
            <td style="font-size:12px;color:rgba(255,255,255,0.8);text-align:right;vertical-align:middle;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Hero block -->
    <tr>
      <td style="background-color:#f8f8f2;padding:36px 32px 24px 32px;border-bottom:4px solid #332121;">
        <div style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#79b7cf;margin-bottom:10px;">{{subject}}</div>
        <div style="font-size:38px;font-weight:900;color:#332121;line-height:1.15;letter-spacing:-0.5px;">{{header}}</div>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="inner" style="padding:28px 32px;background-color:#f8f8f2;">
        <p style="margin:0 0 14px;font-size:17px;font-weight:700;color:#332121;">Hi {{name}},</p>
        <p style="margin:0;font-size:15px;color:#444;line-height:1.75;white-space:pre-wrap;">{{body}}</p>
      </td>
    </tr>

    <!-- CTA strip -->
    <tr>
      <td style="background-color:#79b7cf;padding:20px 32px;text-align:center;">
        <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.9);line-height:1.8;">
          {{business_name}} · {{website}}<br>
          © 2025 {{business_name}}. All rights reserved. · <span style="text-decoration:underline;">Unsubscribe</span>
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
