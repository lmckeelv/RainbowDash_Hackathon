<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<meta name="x-apple-disable-message-reformatting">
<style>
@media (max-width: 450px) {
  .mobile-stack { display: block !important; width: 100% !important; }
  .mobile-hide { display: none !important; }
  .mobile-pad { padding: 16px !important; }
}
</style>
</head>
<body style="width:100%;margin:0;padding:0;background-color:#fffbf7;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#fffbf7">
<tbody><tr><td align="center" style="padding:32px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#fffbf7;border:2px solid #9d0002;font-family:Helvetica,Arial,sans-serif;">
  <tbody>

    <!-- Header bar -->
    <tr>
      <td style="background-color:#9d0002;padding:16px 24px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="color:#ffcb97;font-size:18px;font-weight:700;letter-spacing:0.04em;">{{business_name}}</td>
            <td style="color:#ffcb97;font-size:12px;text-align:right;vertical-align:middle;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Big header text -->
    <tr>
      <td style="padding:32px 28px 8px 28px;background-color:#fffbf7;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#9d0002;margin-bottom:10px;">{{subject}}</div>
        <div style="font-size:42px;font-weight:900;color:#1a0000;line-height:1.1;font-family:Georgia,serif;">{{header}}</div>
      </td>
    </tr>

    <!-- Decorative divider -->
    <tr>
      <td style="padding:16px 28px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="border-top:3px solid #9d0002;font-size:0;">&nbsp;</td>
            <td width="12" style="font-size:0;">&nbsp;</td>
            <td style="border-top:1px solid #ffcb97;font-size:0;">&nbsp;</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td style="padding:8px 28px 28px 28px;background-color:#fffbf7;">
        <p style="margin:0 0 12px;font-size:16px;font-weight:700;color:#1a0000;">Hi {{name}},</p>
        <p style="margin:0;font-size:15px;color:#3d1a1a;line-height:1.7;white-space:pre-wrap;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="background-color:#feca96;padding:16px 24px;border-top:2px solid #9d0002;">
        <p style="margin:0;font-size:11px;text-align:center;color:#3d1a1a;line-height:1.8;">
          <strong>{{business_name}}</strong> · {{website}}<br>
          This email was sent by {{business_name}}. © 2025 {{business_name}}. All rights reserved.
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
