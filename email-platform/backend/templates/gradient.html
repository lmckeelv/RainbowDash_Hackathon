<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .hero { font-size: 34px !important; }
    .pad { padding: 28px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#0f0c29;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#0f0c29">
<tbody><tr><td align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;overflow:hidden;border-radius:12px;">
  <tbody>

    <!-- Gradient hero -->
    <tr>
      <td style="background:linear-gradient(135deg,#302b63 0%,#24243e 50%,#0f0c29 100%);padding:48px 36px 40px 36px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:8px;">{{business_name}} &nbsp;·&nbsp; {{website}}</div>
        <div style="display:inline-block;padding:3px 12px;background:rgba(99,102,241,0.3);border:1px solid rgba(99,102,241,0.6);border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#a5b4fc;margin-bottom:20px;">{{subject}}</div>
        <div class="hero" style="font-size:44px;font-weight:800;color:#ffffff;line-height:1.1;letter-spacing:-1px;margin-bottom:0;">{{header}}</div>
      </td>
    </tr>

    <!-- Divider line -->
    <tr>
      <td style="height:3px;background:linear-gradient(to right,#6366f1,#a855f7,#ec4899);font-size:0;">&nbsp;</td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="pad" style="padding:36px;background-color:#1a1a2e;">
        <p style="margin:0 0 16px;font-size:16px;font-weight:600;color:#e2e8f0;">Hi {{name}},</p>
        <p style="margin:0;font-size:15px;color:#94a3b8;line-height:1.85;white-space:pre-wrap;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="padding:20px 36px;background-color:#111122;border-top:1px solid #1e1e3a;text-align:center;">
        <p style="margin:0;font-size:11px;color:#334155;line-height:1.8;">
          © 2025 {{business_name}} &nbsp;·&nbsp; {{website}}<br>
          <span style="text-decoration:underline;cursor:pointer;">Unsubscribe</span> &nbsp;·&nbsp; <span style="text-decoration:underline;cursor:pointer;">Manage Preferences</span>
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
