<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .headline { font-size: 36px !important; }
    .pad { padding: 24px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#e8e0d0;font-family:Georgia,'Times New Roman',serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#e8e0d0">
<tbody><tr><td align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#fdfaf5;border:1px solid #c8bea8;">
  <tbody>

    <!-- Masthead -->
    <tr>
      <td style="padding:20px 32px 16px 32px;border-bottom:3px double #111111;text-align:center;">
        <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#666;font-family:'Helvetica Neue',Arial,sans-serif;margin-bottom:6px;">{{subject}}</div>
        <div style="font-size:32px;font-weight:900;color:#111111;letter-spacing:-0.5px;font-family:Georgia,serif;">{{business_name}}</div>
        <div style="font-size:11px;color:#888;font-family:'Helvetica Neue',Arial,sans-serif;margin-top:4px;letter-spacing:0.06em;">{{website}} &nbsp;·&nbsp; Est. 2025</div>
      </td>
    </tr>

    <!-- Big headline -->
    <tr>
      <td style="padding:28px 32px 12px 32px;border-bottom:1px solid #c8bea8;">
        <div class="headline" style="font-size:46px;font-weight:900;color:#111111;line-height:1.05;letter-spacing:-1px;">{{header}}</div>
      </td>
    </tr>

    <!-- Byline -->
    <tr>
      <td style="padding:10px 32px;border-bottom:3px solid #111111;">
        <div style="font-size:12px;color:#666;font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;">A message for {{name}}</div>
      </td>
    </tr>

    <!-- Body text -->
    <tr>
      <td class="pad" style="padding:24px 32px 32px 32px;">
        <p style="margin:0;font-size:16px;color:#2a2a2a;line-height:1.85;white-space:pre-wrap;text-align:justify;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer rule + credits -->
    <tr>
      <td style="padding:16px 32px;border-top:3px double #111111;background-color:#f0e8d8;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:10px;color:#888;letter-spacing:0.1em;text-transform:uppercase;font-family:'Helvetica Neue',Arial,sans-serif;">© 2025 {{business_name}}</td>
            <td style="text-align:right;font-size:10px;color:#888;letter-spacing:0.1em;text-transform:uppercase;font-family:'Helvetica Neue',Arial,sans-serif;"><span style="text-decoration:underline;cursor:pointer;">Unsubscribe</span></td>
          </tr>
        </table>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
