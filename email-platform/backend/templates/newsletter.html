<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
@media (max-width: 450px) {
  .pad { padding: 24px 20px !important; }
  .hero-pad { padding: 28px 20px 20px !important; }
}
</style>
</head>
<body style="margin:0;padding:0;background-color:#fdf4ff;font-family:Georgia,'Times New Roman',serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#fdf4ff">
<tbody><tr><td align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#ffffff;border:1px solid #f0abfc;border-radius:12px;overflow:hidden;">
  <tbody>

    <!-- Header -->
    <tr>
      <td style="background:linear-gradient(135deg,#e879f9,#c026d3);padding:24px 32px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td>
              <div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.7);font-family:'Helvetica Neue',Arial,sans-serif;margin-bottom:4px;">{{business_name}}</div>
              <div style="font-size:13px;color:rgba(255,255,255,0.6);font-family:'Helvetica Neue',Arial,sans-serif;">{{website}}</div>
            </td>
            <td style="text-align:right;vertical-align:middle;">
              <div style="width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:inline-block;"></div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Subject tag + headline -->
    <tr>
      <td class="hero-pad" style="padding:36px 32px 24px 32px;background-color:#fdf4ff;border-bottom:1px solid #f0abfc;">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#a21caf;font-family:'Helvetica Neue',Arial,sans-serif;margin-bottom:12px;">✦ {{subject}}</div>
        <div style="font-size:36px;font-weight:normal;color:#1a0025;line-height:1.2;letter-spacing:-0.3px;">{{header}}</div>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="pad" style="padding:28px 32px;background-color:#ffffff;">
        <p style="margin:0 0 14px;font-size:17px;color:#1a0025;font-style:italic;">Dear {{name}},</p>
        <p style="margin:0;font-size:15px;color:#4a1259;line-height:1.9;white-space:pre-wrap;font-family:'Helvetica Neue',Arial,sans-serif;">{{body}}</p>
      </td>
    </tr>

    <!-- Decorative strip -->
    <tr>
      <td style="padding:0;">
        <div style="height:6px;background:linear-gradient(to right,#e879f9,#818cf8,#e879f9);"></div>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="padding:20px 32px;background-color:#fdf4ff;text-align:center;">
        <p style="margin:0;font-size:11px;color:#a855b5;line-height:1.8;font-family:'Helvetica Neue',Arial,sans-serif;">
          {{business_name}} · {{website}}<br>
          © 2025 {{business_name}} · <span style="text-decoration:underline;">Unsubscribe</span> · <span style="text-decoration:underline;">Manage Preferences</span>
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
