<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .hero { font-size: 38px !important; }
    .pad { padding: 24px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#050510;font-family:'Courier New',Courier,monospace;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#050510">
<tbody><tr><td align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#0a0a1a;border:1px solid #ff2d78;overflow:hidden;">
  <tbody>

    <!-- Top bar -->
    <tr>
      <td style="background-color:#0a0a1a;padding:14px 28px;border-bottom:1px solid #ff2d78;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#ff2d78;">{{business_name}}</td>
            <td style="font-size:11px;color:#00e5ff;text-align:right;letter-spacing:0.1em;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Glitch subject -->
    <tr>
      <td style="padding:32px 28px 0 28px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#00e5ff;margin-bottom:12px;">&gt; {{subject}}_</div>
      </td>
    </tr>

    <!-- Neon headline -->
    <tr>
      <td style="padding:0 28px 8px 28px;">
        <div class="hero" style="font-size:48px;font-weight:900;color:#ffffff;line-height:1.0;letter-spacing:-1px;text-shadow:0 0 20px rgba(255,45,120,0.6);">{{header}}</div>
      </td>
    </tr>

    <!-- Neon rule -->
    <tr>
      <td style="padding:16px 28px;">
        <div style="height:2px;background:linear-gradient(to right,#ff2d78,#00e5ff);"></div>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="pad" style="padding:8px 28px 32px 28px;">
        <p style="margin:0 0 16px;font-size:14px;font-weight:700;color:#ff2d78;letter-spacing:0.06em;">// Hi {{name}},</p>
        <p style="margin:0;font-size:14px;color:#a0aec0;line-height:1.85;white-space:pre-wrap;letter-spacing:0.02em;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="padding:16px 28px;border-top:1px solid #1a1a3a;text-align:center;">
        <p style="margin:0;font-size:10px;color:#333355;line-height:1.8;letter-spacing:0.1em;text-transform:uppercase;">
          © 2025 {{business_name}} · {{website}}<br>
          <span style="color:#ff2d78;text-decoration:underline;cursor:pointer;">UNSUBSCRIBE</span>
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
