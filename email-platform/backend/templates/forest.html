<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .hero { font-size: 34px !important; }
    .pad { padding: 28px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#e8f0e9;font-family:Georgia,'Times New Roman',serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#e8f0e9">
<tbody><tr><td align="center" style="padding:40px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:580px;background-color:#ffffff;border-radius:4px;overflow:hidden;border:1px solid #c8dcc9;">
  <tbody>

    <!-- Deep green header -->
    <tr>
      <td style="background-color:#1e3d2f;padding:24px 32px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td>
              <div style="font-size:14px;font-weight:700;color:#a8d5b5;font-family:'Helvetica Neue',Arial,sans-serif;letter-spacing:0.06em;">{{business_name}}</div>
              <div style="font-size:11px;color:#5a8a6a;margin-top:3px;font-family:'Helvetica Neue',Arial,sans-serif;">{{website}}</div>
            </td>
            <td style="text-align:right;vertical-align:middle;">
              <div style="font-size:28px;color:#a8d5b5;line-height:1;">✿</div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Leaf-green accent bar -->
    <tr>
      <td style="background:linear-gradient(to right,#4a7c59,#6dab7d,#4a7c59);height:4px;font-size:0;">&nbsp;</td>
    </tr>

    <!-- Headline -->
    <tr>
      <td style="padding:36px 32px 16px 32px;background-color:#f8fbf8;">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#4a7c59;font-family:'Helvetica Neue',Arial,sans-serif;margin-bottom:12px;">{{subject}}</div>
        <div class="hero" style="font-size:40px;font-weight:normal;color:#1e3d2f;line-height:1.15;">{{header}}</div>
      </td>
    </tr>

    <!-- Divider -->
    <tr>
      <td style="padding:0 32px 24px 32px;background-color:#f8fbf8;">
        <div style="border-top:1px solid #c8dcc9;"></div>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="pad" style="padding:0 32px 36px 32px;background-color:#ffffff;">
        <p style="margin:0 0 14px;font-size:17px;color:#1e3d2f;font-style:italic;">Dear {{name}},</p>
        <p style="margin:0;font-size:15px;color:#3a5a45;line-height:1.9;white-space:pre-wrap;font-family:'Helvetica Neue',Arial,sans-serif;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="background-color:#1e3d2f;padding:18px 32px;text-align:center;">
        <p style="margin:0;font-size:11px;color:#5a8a6a;line-height:1.8;font-family:'Helvetica Neue',Arial,sans-serif;">
          {{business_name}} · {{website}}<br>
          <span style="text-decoration:underline;cursor:pointer;">Unsubscribe</span> &nbsp;·&nbsp; <span style="text-decoration:underline;cursor:pointer;">Manage Preferences</span>
        </p>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
