<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<style>
  @media (max-width: 450px) {
    .hero { font-size: 40px !important; }
    .pad { padding: 24px 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#f5f500;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#f5f500">
<tbody><tr><td align="center" style="padding:32px 16px;">

<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0"
  style="max-width:600px;background-color:#111111;overflow:hidden;">
  <tbody>

    <!-- Ticker bar -->
    <tr>
      <td style="background-color:#f5f500;padding:10px 24px;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:12px;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:#111111;">{{business_name}}</td>
            <td style="font-size:11px;font-weight:700;color:#333;text-align:right;letter-spacing:0.06em;">{{website}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Huge subject label -->
    <tr>
      <td style="padding:40px 28px 0 28px;">
        <div style="font-size:11px;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:#f5f500;margin-bottom:14px;">↳ {{subject}}</div>
      </td>
    </tr>

    <!-- Massive headline -->
    <tr>
      <td style="padding:0 28px 28px 28px;">
        <div class="hero" style="font-size:54px;font-weight:900;color:#ffffff;line-height:1.0;letter-spacing:-2px;text-transform:uppercase;">{{header}}</div>
      </td>
    </tr>

    <!-- Yellow rule -->
    <tr>
      <td style="padding:0 28px;">
        <div style="height:4px;background-color:#f5f500;"></div>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td class="pad" style="padding:28px;background-color:#111111;">
        <p style="margin:0 0 16px;font-size:16px;font-weight:700;color:#f5f500;">Hi {{name}},</p>
        <p style="margin:0;font-size:15px;color:#cccccc;line-height:1.8;white-space:pre-wrap;">{{body}}</p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="background-color:#000000;padding:18px 28px;border-top:1px solid #222;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:11px;color:#444;letter-spacing:0.06em;">© 2025 {{business_name}}</td>
            <td style="text-align:right;font-size:11px;color:#444;letter-spacing:0.06em;"><span style="text-decoration:underline;">Unsubscribe</span></td>
          </tr>
        </table>
      </td>
    </tr>

  </tbody>
</table>

</td></tr></tbody></table>
</body></html>
