<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email Tool Test</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    section { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
    input, textarea { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; margin-top: 4px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-top: 10px; }
    button { margin-top: 14px; padding: 10px 20px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .error { color: red; }
    .success { color: green; }
    ul { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h2>📧 Email Tool</h2>

  <!-- Step 1: Upload -->
  <section>
    <h3>1. Upload Contacts (.csv or .txt)</h3>
    <input type="file" id="fileInput" accept=".csv,.txt" />
    <div id="uploadResult"></div>
  </section>

  <!-- Step 2: Compose (hidden until upload succeeds) -->
  <section id="composeSection" style="display:none">
    <h3>2. Compose Test Email</h3>
    <label>Subject</label>
    <input type="text" id="subject" value="Test Email" />
    <label>Body (HTML)</label>
    <textarea id="body" rows="5"><p>Hello! This is a test email.</p></textarea>
    <button id="sendBtn" onclick="sendEmails()">Send</button>
  </section>

  <!-- Step 3: Send result -->
  <section id="sendResult" style="display:none">
    <div id="sendResultContent"></div>
  </section>

  <script>
    let recipients = [];

    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const resultDiv = document.getElementById("uploadResult");
      resultDiv.innerHTML = "Uploading…";

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch("http://127.0.0.1:8000/upload-contacts", {
          method: "POST",
          body: formData,
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Upload failed");

        recipients = data.recipients;

        let html = `<p class="success">✅ <strong>${data.valid_count}</strong> valid recipients</p>`;
        if (data.duplicate_count > 0) html += `<p>🔁 ${data.duplicate_count} duplicates removed</p>`;
        if (data.invalid_count > 0) {
          html += `<p>⚠️ ${data.invalid_count} invalid emails skipped:</p><ul>`;
          data.invalid_emails.forEach(e => html += `<li>${e}</li>`);
          html += `</ul>`;
        }
        resultDiv.innerHTML = html;

        document.getElementById("composeSection").style.display = "block";
        document.getElementById("sendBtn").textContent = `Send to ${recipients.length} recipient${recipients.length !== 1 ? "s" : ""}`;
      } catch (err) {
        resultDiv.innerHTML = `<p class="error">${err.message}</p>`;
      }
    });

    async function sendEmails() {
      const btn = document.getElementById("sendBtn");
      btn.disabled = true;
      btn.textContent = "Sending…";

      const resultSection = document.getElementById("sendResult");
      const resultContent = document.getElementById("sendResultContent");
      resultSection.style.display = "block";
      resultContent.innerHTML = "Sending…";

      try {
        const res = await fetch("http://127.0.0.1:8000/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            recipients,
            subject: document.getElementById("subject").value,
            body: document.getElementById("body").value,
          }),
        });
        const data = await res.json();

        let html = `<p class="success">✅ Sent: <strong>${data.sent_count}</strong></p>`;
        if (data.error_count > 0) html += `<p class="error">❌ Failed: ${data.error_count}</p>`;
        resultContent.innerHTML = html;
      } catch (err) {
        resultContent.innerHTML = `<p class="error">${err.message}</p>`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
